<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opnr | Ethereal Transcendence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --accent: #f3f3f3;
            --subtle-gold: #c5a059;
            --bg: #020202;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            cursor: none;
        }

        #canvas-container {
            position: absolute; inset: 0;
            z-index: 1;
        }

        /* Celestial HUD */
        .interface {
            position: absolute; inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: clamp(40px, 6vw, 100px);
        }

        .top-shelf {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .side-label {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-family: 'DM Mono', monospace;
            font-size: 0.55rem;
            letter-spacing: 0.8em;
            color: var(--subtle-gold);
            text-transform: uppercase;
            opacity: 0.5;
        }

        .center-meta {
            text-align: center;
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 1em;
            text-transform: uppercase;
            color: white;
            mix-blend-mode: difference;
        }

        .hero {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }

        .title {
            font-size: clamp(6rem, 22vw, 24rem);
            font-weight: 100;
            line-height: 0.8;
            margin: 0;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            color: white;
            opacity: 0.03;
            user-select: none;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .btn-genesis {
            pointer-events: auto;
            background: none;
            border: none;
            padding: 20px;
            color: white;
            font-weight: 200;
            text-transform: uppercase;
            letter-spacing: 1.2em;
            font-size: 0.6rem;
            cursor: pointer;
            transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-genesis:hover {
            letter-spacing: 1.5em;
            color: var(--subtle-gold);
        }

        /* Post-Processing Overlays */
        .bloom-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, rgba(197, 160, 89, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 2;
        }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.95) 100%);
            pointer-events: none;
            z-index: 5;
        }

        .scanlines {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(255,255,255,0.02) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 6;
        }

        #cursor {
            width: 2px; height: 100px;
            background: linear-gradient(to bottom, transparent, var(--subtle-gold), transparent);
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
        }

        #cursor-ring {
            width: 60px; height: 60px;
            border: 0.5px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 999;
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }
    </style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<div class="vignette"></div>
<div class="bloom-overlay" id="bloom"></div>
<div class="scanlines"></div>

<div id="canvas-container"></div>

<div class="interface">
    <div class="top-shelf">
        <div class="side-label">IMMUTABLE_ASSET</div>
        <div class="center-meta">FRAGMENT_001 // OPNR</div>
        <div class="side-label">ETHEREAL_LAYER</div>
    </div>

    <div class="hero">
        <h1 class="title">AETHER</h1>
    </div>

    <div class="footer">
        <div class="center-meta" style="text-align: left; opacity: 0.3">
            01. ARCHITECTURE<br>
            02. RESONANCE<br>
            03. SOVEREIGNTY
        </div>
        <button class="btn-genesis" id="btnAction">Transcending...</button>
    </div>
</div>

<script>
    let scene, camera, renderer, ribbons = [], lightNode;
    let targetMouse = new THREE.Vector2(0, 0);
    let currentMouse = new THREE.Vector2(0, 0);
    const clock = new THREE.Clock();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(25, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Volumetric Light Simulation
        lightNode = new THREE.PointLight(0xffffff, 15, 60);
        lightNode.position.set(0, 0, 5);
        scene.add(lightNode);

        const fillLight = new THREE.DirectionalLight(0xc5a059, 0.5);
        fillLight.position.set(-10, 10, 10);
        scene.add(fillLight);

        // The Ribbon Core
        const ribbonCount = 64; 
        const ribbonMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.2,
            roughness: 0.05,
            transmission: 1.0,
            thickness: 8,
            ior: 1.5,
            attenuationColor: 0xc5a059,
            attenuationDistance: 0.5,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1,
            side: THREE.DoubleSide
        });

        for(let i = 0; i < ribbonCount; i++) {
            // Elongated, needle-like ribbons
            const length = 4 + Math.random() * 8;
            const geo = new THREE.CylinderGeometry(0.005, 0.04, length, 8, 1, true);
            const mesh = new THREE.Mesh(geo, ribbonMaterial);
            
            // Initial positioning in a celestial sphere
            const phi = Math.acos(-1 + (2 * i) / ribbonCount);
            const theta = Math.sqrt(ribbonCount * Math.PI) * phi;
            const radius = 5 + Math.random() * 2;

            mesh.position.set(
                radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.sin(phi) * Math.sin(theta),
                radius * Math.cos(phi)
            );
            
            mesh.lookAt(0,0,0);
            mesh.rotateX(Math.PI / 2);
            
            mesh.userData.phi = phi;
            mesh.userData.theta = theta;
            mesh.userData.radius = radius;
            mesh.userData.driftSpeed = 0.05 + Math.random() * 0.1;
            mesh.userData.origScale = mesh.scale.clone();
            
            ribbons.push(mesh);
            scene.add(mesh);
        }

        window.addEventListener('resize', onResize);
        document.addEventListener('mousemove', (e) => {
            targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            gsap.to('#cursor', { left: e.clientX, top: e.clientY, duration: 0.6, ease: "power2.out" });
            gsap.to('#cursor-ring', { left: e.clientX, top: e.clientY, duration: 1.2, ease: "power2.out" });
        });

        animate();
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        currentMouse.lerp(targetMouse, 0.03);

        // Bloom Pulse
        const bloomIntensity = 0.05 + Math.sin(t * 0.5) * 0.02;
        document.getElementById('bloom').style.background = `radial-gradient(circle at center, rgba(197, 160, 89, ${bloomIntensity}) 0%, transparent 70%)`;

        ribbons.forEach((mesh, i) => {
            // Celestial Drift
            mesh.userData.theta += mesh.userData.driftSpeed * 0.1;
            const r = mesh.userData.radius + Math.sin(t * 0.5 + i) * 0.5;
            
            const targetPos = new THREE.Vector3(
                r * Math.sin(mesh.userData.phi) * Math.cos(mesh.userData.theta),
                r * Math.sin(mesh.userData.phi) * Math.sin(mesh.userData.theta),
                r * Math.cos(mesh.userData.phi)
            );

            // Subtle Mouse Influence (Focusing Light)
            const mouseV = new THREE.Vector3(currentMouse.x * 12, currentMouse.y * 12, 0);
            const dist = mesh.position.distanceTo(mouseV);
            const attraction = Math.max(0, (10 - dist) * 0.02);
            
            mesh.position.lerp(targetPos, 0.05);
            mesh.position.lerp(mouseV, attraction);

            // Re-orient to follow flow
            mesh.lookAt(0,0,0);
            mesh.rotateX(Math.PI / 2);
            mesh.rotation.y += 0.01;

            // Breathing scale
            const s = 1 + Math.sin(t * 2 + i) * 0.1;
            mesh.scale.set(s, 1, s);
        });

        // Dynamic Camera (Fluid Motion)
        camera.position.x += (currentMouse.x * 10 - camera.position.x) * 0.01;
        camera.position.y += (-currentMouse.y * 10 - camera.position.y) * 0.01;
        camera.lookAt(0,0,0);
        
        // Light follow
        lightNode.position.x = currentMouse.x * 5;
        lightNode.position.y = currentMouse.y * 5;

        renderer.render(scene, camera);
    }

    document.getElementById('btnAction').addEventListener('click', function() {
        const tl = gsap.timeline();
        this.style.pointerEvents = "none";
        
        tl.to(camera.position, { z: 15, duration: 3, ease: "expo.inOut" })
          .to(".interface", { opacity: 0, scale: 1.1, duration: 1.5 }, 0)
          .to(ribbons.map(r => r.scale), { x: 0, z: 0, duration: 1, stagger: 0.01 }, 1)
          .set("body", { backgroundColor: "white" })
          .set("body", { backgroundColor: "#020202" }, "+=0.1")
          .add(() => {
              ribbons.forEach(r => {
                  r.scale.set(1, 1, 1);
                  r.userData.radius *= 1.5;
              });
              this.innerText = "ASCENSION_COMPLETE";
          })
          .to(camera.position, { z: 30, duration: 4, ease: "power4.out" })
          .to(".interface", { opacity: 1, scale: 1, duration: 2 });
    });

    window.onload = init;
</script>

</body>
</html>
