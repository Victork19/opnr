<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opnr | Metamorphic Transcendence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;900&family=Playfair+Display:ital,wght@1,400;1,900&display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --accent: #ffffff;
            --bg: #000000;
            --grain: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            cursor: none;
        }

        #canvas-container {
            position: absolute; inset: 0;
            z-index: 1;
            filter: contrast(1.1) brightness(1.1);
        }

        /* High-Art Interface */
        .interface {
            position: absolute; inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5vh 5vw;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -0.05em;
        }

        .status {
            font-size: 0.6rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            opacity: 0.5;
        }

        .main-stage {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reveal-text {
            text-align: center;
            mix-blend-mode: exclusion;
        }

        .reveal-text h1 {
            font-size: clamp(8rem, 25vw, 30rem);
            margin: 0;
            font-weight: 900;
            line-height: 0.75;
            letter-spacing: -0.08em;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }

        .coord-box {
            font-family: monospace;
            font-size: 0.6rem;
            opacity: 0.4;
            line-height: 1.6;
        }

        .btn-action {
            pointer-events: auto;
            background: white;
            color: black;
            border: none;
            padding: 20px 40px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            cursor: pointer;
            transition: clip-path 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .btn-action:hover {
            clip-path: polygon(0 0, 90% 0, 100% 100%, 10% 100%);
        }

        /* Aesthetic Layers */
        .noise {
            position: fixed; inset: 0;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.06;
            pointer-events: none;
            z-index: 20;
            mix-blend-mode: overlay;
        }

        .light-leak {
            position: fixed; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 5;
        }

        #custom-cursor {
            width: 80px; height: 80px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #custom-cursor::after {
            content: '';
            width: 4px; height: 4px;
            background: white;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div id="custom-cursor"></div>
<div class="noise"></div>
<div class="light-leak" id="leak"></div>

<div id="canvas-container"></div>

<div class="interface">
    <div class="header">
        <div class="brand">OPNR_CORE</div>
        <div class="status" id="statusLine">RESONATING / 001</div>
    </div>

    <div class="main-stage">
        <div class="reveal-text">
            <h1 id="titleText">VOID</h1>
        </div>
    </div>

    <div class="footer">
        <div class="coord-box" id="coords">
            X: 0.000<br>
            Y: 0.000<br>
            Z: 1.000
        </div>
        <button class="btn-action" id="trigger">Dissolve</button>
    </div>
</div>

<script>
    let scene, camera, renderer, monoliths = [], coreLight;
    let targetMouse = new THREE.Vector2(0, 0);
    let currentMouse = new THREE.Vector2(0, 0);
    const clock = new THREE.Clock();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(20, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 40;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Dramatic Lighting
        coreLight = new THREE.RectAreaLight(0xffffff, 50, 10, 10);
        coreLight.position.set(0, 0, 2);
        scene.add(coreLight);

        const pointLight = new THREE.PointLight(0xffffff, 2, 100);
        pointLight.position.set(20, 20, 20);
        scene.add(pointLight);

        // The Monolith System
        const count = 45;
        const mat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0.0,
            transmission: 0.95,
            thickness: 2,
            ior: 1.5,
            reflectivity: 0.5,
            iridescence: 1.0,
            iridescenceIOR: 1.3,
            sheen: 1,
            sheenColor: 0x00ffff
        });

        for(let i = 0; i < count; i++) {
            // Irregular brutalist shards
            const w = 0.1 + Math.random() * 0.4;
            const h = 2 + Math.random() * 10;
            const geo = new THREE.BoxGeometry(w, h, w);
            const mesh = new THREE.Mesh(geo, mat);
            
            const radius = 4 + Math.random() * 3;
            const angle = (i / count) * Math.PI * 2;
            
            mesh.position.set(
                Math.cos(angle) * radius,
                Math.sin(angle) * radius,
                (Math.random() - 0.5) * 5
            );
            
            mesh.rotation.x = Math.random() * Math.PI;
            mesh.rotation.y = Math.random() * Math.PI;
            
            mesh.userData = {
                angle: angle,
                radius: radius,
                speed: 0.2 + Math.random() * 0.4,
                rotSpeed: (Math.random() - 0.5) * 0.02
            };
            
            monoliths.push(mesh);
            scene.add(mesh);
        }

        window.addEventListener('resize', onResize);
        document.addEventListener('mousemove', onMouseMove);

        animate();
    }

    function onMouseMove(e) {
        targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        
        gsap.to('#custom-cursor', { left: e.clientX, top: e.clientY, duration: 0.4, ease: "power3.out" });
        gsap.to('#leak', { 
            left: -50 + (targetMouse.x * 10) + "%", 
            top: -50 - (targetMouse.y * 10) + "%", 
            duration: 2 
        });

        document.getElementById('coords').innerHTML = `
            X: ${targetMouse.x.toFixed(3)}<br>
            Y: ${targetMouse.y.toFixed(3)}<br>
            Z: ${(1 - Math.abs(targetMouse.x)).toFixed(3)}
        `;
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        currentMouse.lerp(targetMouse, 0.05);

        monoliths.forEach((m, i) => {
            // Fluid brutalism movement
            m.userData.angle += m.userData.speed * 0.01;
            const r = m.userData.radius + Math.sin(t * 0.5 + i) * 0.5;
            
            const destX = Math.cos(m.userData.angle) * r;
            const destY = Math.sin(m.userData.angle) * r;
            
            // Mouse Interaction (Visceral pull)
            const dx = (currentMouse.x * 10) - m.position.x;
            const dy = (currentMouse.y * 10) - m.position.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const pull = Math.max(0, (12 - dist) * 0.01);

            m.position.x += (destX - m.position.x) * 0.02 + dx * pull;
            m.position.y += (destY - m.position.y) * 0.02 + dy * pull;
            m.position.z += (Math.sin(t + i) * 0.01);

            m.rotation.x += m.userData.rotSpeed;
            m.rotation.y += m.userData.rotSpeed;
            
            // Subtle chromatic shift based on position
            m.material.iridescence = Math.abs(currentMouse.x);
        });

        // Dynamic Camera
        camera.position.x += (currentMouse.x * 15 - camera.position.x) * 0.02;
        camera.position.y += (-currentMouse.y * 15 - camera.position.y) * 0.02;
        camera.lookAt(0,0,0);
        
        // Tilt
        camera.rotation.z = currentMouse.x * 0.1;

        renderer.render(scene, camera);
    }

    // Trigger Dissolve Sequence
    document.getElementById('trigger').addEventListener('click', function() {
        const tl = gsap.timeline();
        this.style.pointerEvents = "none";
        
        document.getElementById('statusLine').innerText = "DISSOLVING_REALITY...";
        document.getElementById('titleText').innerText = "GONE";

        tl.to(monoliths.map(m => m.position), {
            x: () => (Math.random() - 0.5) * 100,
            y: () => (Math.random() - 0.5) * 100,
            z: () => (Math.random() - 0.5) * 100,
            duration: 3,
            ease: "expo.inOut",
            stagger: 0.005
        })
        .to(camera.position, { z: 10, duration: 2, ease: "power4.in" }, 0)
        .set("body", { filter: "invert(1)" })
        .set("body", { filter: "invert(0)" }, "+=0.1")
        .add(() => {
            monoliths.forEach(m => {
                const angle = Math.random() * Math.PI * 2;
                m.position.set(Math.cos(angle)*5, Math.sin(angle)*5, 0);
            });
            document.getElementById('titleText').innerText = "REBORN";
            document.getElementById('statusLine').innerText = "RECONSTRUCTED";
        })
        .to(camera.position, { z: 40, duration: 4, ease: "expo.out" })
        .to(monoliths.map(m => m.scale), { x: 1, y: 1, z: 1, duration: 1 }, "-=2");
    });

    window.onload = init;
</script>

</body>
</html>
