<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opnr | Neo-Brutalist Void</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=DM+Mono&display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg: #FF4F00; /* International Orange */
            --accent: #000000;
            --text-main: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'DM Mono', monospace;
            cursor: none;
        }

        #canvas-container {
            position: absolute; inset: 0;
            z-index: 1;
        }

        /* The Neo-Brutalist UI */
        .interface {
            position: absolute; inset: 0;
            z-index: 10;
            pointer-events: none;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 3rem;
            letter-spacing: -0.05em;
            line-height: 0.8;
            color: #000;
            mix-blend-mode: overlay;
        }

        .tagline {
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: bold;
            color: #000;
            border: 2px solid #000;
            padding: 5px 15px;
        }

        .hero-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 40vw;
            color: rgba(255, 255, 255, 0.15);
            z-index: -1;
            user-select: none;
            white-space: nowrap;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .metrics {
            font-size: 0.75rem;
            font-weight: bold;
            color: #000;
            line-height: 1.4;
        }

        #custom-cursor {
            position: fixed;
            width: 60px; height: 60px;
            background: #000;
            pointer-events: none;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }

        /* Scanline Glitch Effect */
        .scanlines {
            position: fixed; inset: 0;
            z-index: 15;
            pointer-events: none;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.05) 51%);
            background-size: 100% 4px;
        }
    </style>
</head>
<body>

<div id="custom-cursor"></div>
<div class="scanlines"></div>
<div id="canvas-container"></div>

<div class="interface">
    <div class="header">
        <div class="logo">OPNR<br>V.07</div>
        <div class="tagline">S_RANGE_INIT</div>
    </div>

    <div class="hero-text">ORNG</div>

    <div class="footer">
        <div class="metrics">
            RAD_INTENSITY: <span id="rad-val">HIGH</span><br>
            SIGNAL: OVERLOAD<br>
            MODE: AGGRESSIVE
        </div>
        <div class="metrics" style="text-align: right;">
            SYSTEM_CLK: <span id="clock">00:00:00</span><br>
            THREAT_LVL: 0.00
        </div>
    </div>
</div>

<script>
    let scene, camera, renderer, fragments = [];
    let targetMouse = new THREE.Vector2(0, 0);
    let currentMouse = new THREE.Vector2(0, 0);
    const clock = new THREE.Clock();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 100;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // High Intensity Studio Lighting
        const directionalLight = new THREE.DirectionalLight(0xffffff, 5);
        directionalLight.position.set(0, 50, 50);
        scene.add(directionalLight);

        const pointLight = new THREE.PointLight(0x00ffff, 2); // Cyan accent light
        pointLight.position.set(-50, -50, 50);
        scene.add(pointLight);

        // Material: Wireframe Black with Glitch Emissive
        const wireframeMat = new THREE.MeshStandardMaterial({
            color: 0x000000,
            wireframe: true,
            wireframeLinewidth: 2,
            emissive: 0x000000,
            roughness: 0
        });

        // The "Kinetic Wireframe Sprawl"
        const shardCount = 60;
        for (let i = 0; i < shardCount; i++) {
            const size = 1 + Math.random() * 10;
            // Mixed geometries for a more chaotic "junk" look
            let geo;
            const rand = Math.random();
            if(rand > 0.6) geo = new THREE.BoxGeometry(size, size, size);
            else if(rand > 0.3) geo = new THREE.IcosahedronGeometry(size, 0);
            else geo = new THREE.TorusGeometry(size/2, 1, 8, 16);

            const shard = new THREE.Mesh(geo, wireframeMat);
            
            shard.position.set(
                (Math.random() - 0.5) * 80,
                (Math.random() - 0.5) * 80,
                (Math.random() - 0.5) * 80
            );
            
            shard.userData = {
                origin: shard.position.clone(),
                rotationSpeed: {
                    x: (Math.random() - 0.5) * 0.05,
                    y: (Math.random() - 0.5) * 0.05
                },
                jitter: Math.random()
            };
            
            fragments.push(shard);
            scene.add(shard);
        }

        window.addEventListener('resize', onResize);
        document.addEventListener('mousemove', (e) => {
            targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            gsap.to('#custom-cursor', { 
                left: e.clientX - 30, 
                top: e.clientY - 30, 
                duration: 0.05,
                rotation: e.clientX + e.clientY
            });
        });

        animate();
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        currentMouse.lerp(targetMouse, 0.08);

        fragments.forEach((shard) => {
            // Constant Rotation
            shard.rotation.x += shard.userData.rotationSpeed.x;
            shard.rotation.y += shard.userData.rotationSpeed.y;

            // Mouse Repulsion
            const mousePos = new THREE.Vector3(currentMouse.x * 70, currentMouse.y * 60, 0);
            const distance = shard.position.distanceTo(mousePos);
            const force = Math.max(0, 35 - distance) * 0.8;
            
            const direction = new THREE.Vector3().subVectors(shard.position, mousePos).normalize();
            const targetPos = shard.userData.origin.clone();
            
            // Jitter / Glitch effect
            const jitter = Math.sin(t * 20 + shard.userData.jitter) * 0.5;
            targetPos.add(direction.multiplyScalar(force + jitter));
            
            shard.position.lerp(targetPos, 0.1);
            
            // Pulse emissive on proximity
            if(distance < 30) {
                shard.material.emissive.setHex(0xffffff);
            } else {
                shard.material.emissive.setHex(0x000000);
            }
        });

        // Background Text Parallax
        gsap.to('.hero-text', {
            x: currentMouse.x * -50,
            y: -currentMouse.y * -30,
            duration: 1
        });

        // Update Clock
        const now = new Date();
        document.getElementById('clock').innerText = 
            now.getHours().toString().padStart(2, '0') + ":" + 
            now.getMinutes().toString().padStart(2, '0') + ":" + 
            now.getSeconds().toString().padStart(2, '0');

        renderer.render(scene, camera);
    }

    window.onload = init;
</script>

</body>
</html>
