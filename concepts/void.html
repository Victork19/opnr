<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opnr | Structural Void</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=DM+Mono&display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg: #050505;
            --accent: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            color: white;
            font-family: 'DM Mono', monospace;
            cursor: none;
        }

        #canvas-container {
            position: absolute; inset: 0;
            z-index: 1;
        }

        /* The Brutalist UI */
        .interface {
            position: absolute; inset: 0;
            z-index: 10;
            pointer-events: none;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 2.5rem;
            letter-spacing: -0.05em;
            line-height: 0.8;
        }

        .tagline {
            font-size: 0.65rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            opacity: 0.4;
            transform: rotate(90deg) translateX(50%);
            transform-origin: right center;
        }

        .hero-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 35vw;
            color: #0a0a0a;
            z-index: -1;
            user-select: none;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .metrics {
            font-size: 0.7rem;
            opacity: 0.3;
            line-height: 1.6;
        }

        #custom-cursor {
            position: fixed;
            width: 40px; height: 40px;
            border: 1px solid rgba(255,255,255,0.5);
            pointer-events: none;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }
        #custom-cursor::after {
            content: '';
            width: 2px; height: 2px;
            background: white;
        }

        /* Structural Grid Overlay */
        .grid-overlay {
            position: fixed; inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 10vh 10vh;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

<div id="custom-cursor"></div>
<div class="grid-overlay"></div>
<div id="canvas-container"></div>

<div class="interface">
    <div class="header">
        <div class="logo">OPNR<br>V.06</div>
        <div class="tagline">FUTURE_PROOFING_THE_VOID</div>
    </div>

    <div class="hero-text">NULL</div>

    <div class="footer">
        <div class="metrics">
            DECON_STATUS: ACTIVE<br>
            LATENCY: 0.002ms<br>
            GRID_REF: 009x-44
        </div>
        <div class="metrics" style="text-align: right;">
            SYSTEM_TIME: <span id="clock">00:00:00</span><br>
            ENCRYPTION: SHARDED
        </div>
    </div>
</div>

<script>
    let scene, camera, renderer, fragments = [];
    let targetMouse = new THREE.Vector2(0, 0);
    let currentMouse = new THREE.Vector2(0, 0);
    const clock = new THREE.Clock();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 120;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Harsh Brutalist Lighting
        const directionalLight = new THREE.DirectionalLight(0xffffff, 4);
        directionalLight.position.set(50, 50, 50);
        scene.add(directionalLight);

        const pointLight = new THREE.PointLight(0xffffff, 2);
        pointLight.position.set(-50, -50, 20);
        scene.add(pointLight);

        // Materials: Deep Chrome and Matte Shards
        const chromeMat = new THREE.MeshStandardMaterial({
            color: 0x111111,
            metalness: 1,
            roughness: 0.1,
            emissive: 0x000000
        });

        // The "Deconstructed Hyper-Cube"
        const shardCount = 45;
        for (let i = 0; i < shardCount; i++) {
            const size = 2 + Math.random() * 8;
            const geometry = new THREE.BoxGeometry(size, size, size);
            const shard = new THREE.Mesh(geometry, chromeMat);
            
            shard.position.set(
                (Math.random() - 0.5) * 60,
                (Math.random() - 0.5) * 60,
                (Math.random() - 0.5) * 60
            );
            
            shard.userData = {
                origin: shard.position.clone(),
                rotationSpeed: {
                    x: (Math.random() - 0.5) * 0.02,
                    y: (Math.random() - 0.5) * 0.02,
                    z: (Math.random() - 0.5) * 0.02
                },
                noiseOffset: Math.random() * 100
            };
            
            fragments.push(shard);
            scene.add(shard);
        }

        window.addEventListener('resize', onResize);
        document.addEventListener('mousemove', (e) => {
            targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            gsap.to('#custom-cursor', { 
                left: e.clientX - 20, 
                top: e.clientY - 20, 
                duration: 0.1 
            });
        });

        animate();
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        currentMouse.lerp(targetMouse, 0.04);

        // The "Void" Interaction Logic
        fragments.forEach((shard) => {
            // Constant rotation
            shard.rotation.x += shard.userData.rotationSpeed.x;
            shard.rotation.y += shard.userData.rotationSpeed.y;

            // Mouse Repulsion (The Void effect)
            const mousePos = new THREE.Vector3(currentMouse.x * 60, currentMouse.y * 50, 0);
            const distance = shard.position.distanceTo(mousePos);
            const force = Math.max(0, 40 - distance) * 0.5;
            
            const direction = new THREE.Vector3().subVectors(shard.position, mousePos).normalize();
            
            // Drift back to origin vs. get pushed by mouse
            const targetPos = shard.userData.origin.clone();
            targetPos.add(direction.multiplyScalar(force));
            
            // Add a bit of architectural "stiffness" to the movement
            shard.position.lerp(targetPos, 0.05);
            
            // Scale shards based on force for "compression" effect
            const scale = 1 + force * 0.02;
            shard.scale.set(scale, scale, scale);
        });

        // Background parallax
        gsap.to('.hero-text', {
            x: currentMouse.x * -100,
            y: -currentMouse.y * -50,
            duration: 2
        });

        // Update Clock
        const now = new Date();
        document.getElementById('clock').innerText = 
            now.getHours().toString().padStart(2, '0') + ":" + 
            now.getMinutes().toString().padStart(2, '0') + ":" + 
            now.getSeconds().toString().padStart(2, '0');

        renderer.render(scene, camera);
    }

    window.onload = init;
</script>

</body>
</html>
