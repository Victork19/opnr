<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opnr | Glass & Gravity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,700&family=Inter:wght@100;400;900&display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg: #0a0a0a;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            cursor: none;
        }

        #canvas-container {
            position: absolute; inset: 0;
            z-index: 1;
        }

        /* High-End Architectural Interface */
        .interface {
            position: absolute; inset: 0;
            z-index: 10;
            pointer-events: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            padding: 60px;
        }

        .meta-top-left {
            grid-column: 1; grid-row: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: -0.04em;
            line-height: 0.8;
        }

        .status {
            font-size: 0.5rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            opacity: 0.4;
        }

        .hero-wrap {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .hero-title {
            font-weight: 900;
            font-size: clamp(8rem, 30vw, 35rem);
            letter-spacing: -0.12em;
            color: rgba(255,255,255,0.02);
            text-transform: uppercase;
            margin: 0;
            line-height: 0.7;
        }

        .meta-bottom-right {
            grid-column: 2; grid-row: 2;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-end;
            text-align: right;
            gap: 20px;
        }

        .data-points {
            font-family: 'Inter', sans-serif;
            font-size: 0.5rem;
            line-height: 2.5;
            letter-spacing: 0.3em;
            opacity: 0.3;
        }

        .btn-interact {
            pointer-events: auto;
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 25px 50px;
            font-size: 0.6rem;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .btn-interact:hover {
            background: white;
            color: black;
            border-color: white;
        }

        /* Overlays */
        .lens-flare {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: 5;
        }

        #cursor-ring {
            position: fixed;
            width: 40px; height: 40px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }
    </style>
</head>
<body>

<div id="cursor-ring"></div>
<div class="lens-flare"></div>

<div id="canvas-container"></div>

<div class="interface">
    <div class="meta-top-left">
        <div class="brand">Opnr.</div>
        <div class="status">PHYSICS_ENGINE // ACTIVE</div>
    </div>

    <div class="hero-wrap">
        <h1 class="hero-title">HEAVY</h1>
    </div>

    <div class="meta-bottom-right">
        <div class="data-points">
            REFRACTION: 2.42<br>
            GRAVITY: 9.81 m/s²<br>
            MATERIAL: GLASS_01
        </div>
        <button class="btn-interact" id="trigger">Tether</button>
    </div>
</div>

<script>
    let scene, camera, renderer, rings = [];
    let targetMouse = new THREE.Vector2(0, 0);
    let currentMouse = new THREE.Vector2(0, 0);
    const clock = new THREE.Clock();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 60;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Studio Lighting
        const mainLight = new THREE.PointLight(0xffffff, 15, 100);
        mainLight.position.set(10, 10, 10);
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 2);
        fillLight.position.set(-10, -10, 5);
        scene.add(fillLight);

        // Glass Rings (The Kinetic Sculpture)
        const ringCount = 8;
        const ringMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0,
            roughness: 0,
            transmission: 1,
            thickness: 2,
            ior: 1.5,
            reflectivity: 0.5,
            clearcoat: 1,
            transparent: true,
            opacity: 0.8
        });

        for (let i = 0; i < ringCount; i++) {
            const radius = 5 + i * 1.8;
            const tube = 0.1 + (ringCount - i) * 0.05;
            const geo = new THREE.TorusGeometry(radius, tube, 32, 100);
            const ring = new THREE.Mesh(geo, ringMat);
            
            ring.userData = {
                radius: radius,
                offset: i * 0.2,
                speed: 0.5 + i * 0.1,
                rotX: Math.random() * Math.PI,
                rotY: Math.random() * Math.PI
            };

            rings.push(ring);
            scene.add(ring);
        }

        window.addEventListener('resize', onResize);
        document.addEventListener('mousemove', (e) => {
            targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            gsap.to('#cursor-ring', { left: e.clientX, top: e.clientY, duration: 0.2 });
        });

        animate();
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        currentMouse.lerp(targetMouse, 0.05);

        rings.forEach((ring, i) => {
            // Elastic Follow Logic
            const delay = i * 0.05;
            const targetX = currentMouse.x * 15;
            const targetY = currentMouse.y * 15;

            // Soft oscillation
            ring.position.x += (targetX - ring.position.x) * (0.1 - delay);
            ring.position.y += (targetY - ring.position.y) * (0.1 - delay);
            ring.position.z = Math.sin(t + i) * 2;

            // Kinetic Rotation
            ring.rotation.x = t * 0.2 + (i * 0.1);
            ring.rotation.y = t * 0.3 + (currentMouse.x * 2);
            ring.rotation.z = Math.cos(t * 0.1) * 0.5;

            // Variable Thickness based on speed
            const speed = Math.abs(targetMouse.x - currentMouse.x);
            ring.scale.setScalar(1 + speed * 0.5);
        });

        // Camera Dynamics
        camera.position.x += (currentMouse.x * 10 - camera.position.x) * 0.01;
        camera.position.y += (-currentMouse.y * 10 - camera.position.y) * 0.01;
        camera.lookAt(0, 0, 0);

        renderer.render(scene, camera);
    }

    document.getElementById('trigger').addEventListener('click', function() {
        const tl = gsap.timeline();
        this.style.pointerEvents = "none";
        
        // "Heavy Collapse" Sequence
        tl.to(rings.map(r => r.position), {
            x: 0, y: 0, z: 0,
            duration: 1.5,
            ease: "expo.inOut",
            stagger: 0.05
        })
        .to(rings.map(r => r.rotation), {
            x: Math.PI * 2, y: Math.PI * 2,
            duration: 2,
            ease: "power4.inOut"
        }, 0)
        .to(".hero-title", {
            color: "rgba(255,255,255,1)",
            scale: 0.8,
            duration: 1,
            ease: "expo.out"
        }, "-=0.5")
        .add(() => {
            this.innerText = "COLLAPSED";
            this.style.borderColor = "red";
        });
    });

    window.onload = init;
</script>

</body>
</html>
