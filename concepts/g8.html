<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opnr | The Echo of Absence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,700&family=Inter:wght@100;400;900&display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg: #000000;
            --ink: #ffffff;
            --accent: #333333;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            cursor: none;
        }

        #canvas-container {
            position: absolute; inset: 0;
            z-index: 1;
            /* The secret: a slight blur to create the 'ink' bleed effect */
            filter: contrast(1.5) brightness(1.2) blur(0.8px);
        }

        /* Avant-Garde Interface */
        .interface {
            position: absolute; inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
        }

        .header-meta {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .brand-mark {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 2.5rem;
            line-height: 0.8;
            letter-spacing: -0.05em;
        }

        .serial {
            font-size: 0.5rem;
            letter-spacing: 0.5em;
            opacity: 0.3;
            text-transform: uppercase;
        }

        .center-void {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .displacement-text {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: clamp(6rem, 25vw, 30rem);
            letter-spacing: -0.1em;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.05);
            text-transform: uppercase;
            line-height: 0.7;
            pointer-events: none;
            user-select: none;
        }

        .footer-shelf {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .manifesto {
            max-width: 200px;
            font-size: 0.6rem;
            line-height: 1.6;
            opacity: 0.4;
            letter-spacing: 0.05em;
        }

        .btn-shatter {
            pointer-events: auto;
            background: white;
            color: black;
            border: none;
            width: 120px; height: 120px;
            border-radius: 50%;
            font-size: 0.6rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-shatter:hover {
            transform: scale(0.9);
            background: #ff0000;
            color: white;
        }

        /* Post-Process Overlays */
        .vignette-grain {
            position: fixed; inset: 0;
            background: 
                radial-gradient(circle at center, transparent 0%, rgba(0,0,0,1) 100%),
                url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.15;
            pointer-events: none;
            z-index: 20;
            mix-blend-mode: overlay;
        }

        #custom-cursor {
            position: fixed;
            width: 1px; height: 100vh;
            background: rgba(255,255,255,0.1);
            pointer-events: none;
            z-index: 1000;
            transform: translateX(-50%);
        }

        #custom-cursor::after {
            content: '';
            position: absolute;
            top: var(--y);
            left: 0;
            width: 100vw;
            height: 1px;
            background: rgba(255,255,255,0.1);
            transform: translateY(-50%) translateX(-50%);
        }
    </style>
</head>
<body>

<div id="custom-cursor"></div>
<div class="vignette-grain"></div>

<div id="canvas-container"></div>

<div class="interface">
    <div class="header-meta">
        <div class="brand-mark">Opnr.</div>
        <div class="serial">NON_EXISTENCE_LOG // 000</div>
    </div>

    <div class="center-void">
        <h1 class="displacement-text" id="glitchTitle">VOID</h1>
    </div>

    <div class="footer-shelf">
        <div class="manifesto">
            Beauty is the residue of what we choose to destroy. A study in digital absence.
        </div>
        <button class="btn-shatter" id="trigger">Shatter</button>
    </div>
</div>

<script>
    let scene, camera, renderer, particles, particleCount = 60000;
    let targetMouse = new THREE.Vector2(0, 0);
    let currentMouse = new THREE.Vector2(0, 0);
    const clock = new THREE.Clock();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Particle System (The Entity)
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);

        for (let i = 0; i < particleCount; i++) {
            // Start in a loose sphere
            const r = 15;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            
            positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = r * Math.cos(phi);

            velocities[i * 3] = (Math.random() - 0.5) * 0.1;
            velocities[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
            velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.1;

            sizes[i] = Math.random() * 1.5;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const material = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.1,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true
        });

        particles = new THREE.Points(geometry, material);
        scene.add(particles);

        window.addEventListener('resize', onResize);
        document.addEventListener('mousemove', (e) => {
            targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            document.body.style.setProperty('--y', e.clientY + 'px');
            gsap.to('#custom-cursor', { left: e.clientX, duration: 0.1 });
        });

        animate();
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        currentMouse.lerp(targetMouse, 0.05);

        const posAttr = particles.geometry.attributes.position;
        const positions = posAttr.array;

        for (let i = 0; i < particleCount; i++) {
            const ix = i * 3;
            const iy = i * 3 + 1;
            const iz = i * 3 + 2;

            // 1. Organic Drift (The Wind)
            positions[ix] += Math.sin(t * 0.5 + positions[iy] * 0.1) * 0.02;
            positions[iy] += Math.cos(t * 0.5 + positions[ix] * 0.1) * 0.02;

            // 2. The Magnetism (Return to center)
            positions[ix] *= 0.995;
            positions[iy] *= 0.995;
            positions[iz] *= 0.995;

            // 3. Mouse Wounding (Entropy)
            const mx = currentMouse.x * 30;
            const my = currentMouse.y * 30;
            const dx = positions[ix] - mx;
            const dy = positions[iy] - my;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < 10) {
                const force = (10 - dist) * 0.05;
                positions[ix] += dx * force;
                positions[iy] += dy * force;
            }
        }
        posAttr.needsUpdate = true;

        // Camera Breath
        camera.position.x += (currentMouse.x * 5 - camera.position.x) * 0.02;
        camera.position.y += (-currentMouse.y * 5 - camera.position.y) * 0.02;
        camera.lookAt(0, 0, 0);

        renderer.render(scene, camera);
    }

    document.getElementById('trigger').addEventListener('click', function() {
        const positions = particles.geometry.attributes.position.array;
        
        // Shatter sequence
        gsap.to(document.getElementById('glitchTitle'), {
            opacity: 0, scale: 2, duration: 0.5, onComplete: () => {
                document.getElementById('glitchTitle').innerText = "GONE";
                gsap.to(document.getElementById('glitchTitle'), { opacity: 0.1, scale: 1, duration: 2 });
            }
        });

        for (let i = 0; i < particleCount; i++) {
            const ix = i * 3;
            gsap.to(positions, {
                [ix]: (Math.random() - 0.5) * 100,
                [ix+1]: (Math.random() - 0.5) * 100,
                [ix+2]: (Math.random() - 0.5) * 100,
                duration: 2 + Math.random() * 2,
                ease: "expo.out"
            });
        }
    });

    window.onload = init;
</script>

</body>
</html>
