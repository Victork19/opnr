<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opnr | Platonic Sovereign</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;900&family=DM+Mono:wght@300;500&display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --gold-low: rgba(212, 175, 55, 0.1);
            --bg: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            cursor: none;
        }

        #canvas-container {
            position: absolute; inset: 0;
            z-index: 1;
        }

        /* Architectural Interface */
        .interface {
            position: absolute; inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: clamp(60px, 10vw, 120px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            mix-blend-mode: overlay;
        }

        .meta-data {
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.6em;
            color: var(--gold);
            text-transform: uppercase;
            line-height: 2.5;
        }

        .hero {
            max-width: 1400px;
            margin-bottom: 5vh;
        }

        .title {
            font-size: clamp(5rem, 18vw, 18rem);
            font-weight: 900;
            line-height: 0.7;
            margin: 0;
            letter-spacing: -0.08em;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 0%, #333 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: letter-spacing 2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .manifesto {
            max-width: 400px;
            font-size: 0.85rem;
            font-weight: 100;
            line-height: 2.2;
            margin-top: 60px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .btn-genesis {
            pointer-events: auto;
            background: none;
            border: none;
            padding: 0;
            color: white;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.8em;
            font-size: 0.65rem;
            cursor: pointer;
            position: relative;
            padding-bottom: 10px;
            overflow: visible;
        }

        .btn-genesis::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 1px;
            background: var(--gold);
            transform: scaleX(0.2);
            transform-origin: left;
            transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-genesis:hover::after {
            transform: scaleX(1);
        }

        /* Visual Refinement */
        .grain {
            position: fixed; inset: 0;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03;
            pointer-events: none;
            z-index: 50;
            mix-blend-mode: hard-light;
        }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
            z-index: 5;
        }

        #cursor {
            width: 40px; height: 40px;
            border: 0.5px solid var(--gold);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }
    </style>
</head>
<body>

<div id="cursor"></div>
<div class="vignette"></div>
<div class="grain"></div>

<div id="canvas-container"></div>

<div class="interface">
    <div class="header">
        <div class="meta-data">
            GEO_PRECISION: [0.0001]<br>
            PLATONIC_FORM: ACTIVE
        </div>
        <div class="meta-data" style="text-align: right;">
            EST: MMXXIV<br>
            ARCH_TYPE: VIRTUAL_SOVEREIGN
        </div>
    </div>

    <div class="hero">
        <h1 class="title" id="mainTitle">PURE<br>FORM.</h1>
        <p class="manifesto">
            We don't build for the masses. We build for the discerning. Elegant digital structures designed to weather the entropy of the modern web.
        </p>
    </div>

    <div class="footer">
        <div class="meta-data" style="opacity: 0.15">
            // MINIMAL_LATENCY<br>
            // MAXIMAL_RESONANCE
        </div>
        <button class="btn-genesis" id="btnAction">Begin Sequence</button>
    </div>
</div>

<script>
    let scene, camera, renderer, crystalGroup, lattice;
    let targetMouse = new THREE.Vector2(0, 0);
    let currentMouse = new THREE.Vector2(0, 0);
    const clock = new THREE.Clock();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 25;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lighting Strategy
        const ambient = new THREE.AmbientLight(0xffffff, 0.1);
        scene.add(ambient);

        const pointLight = new THREE.PointLight(0xD4AF37, 20, 50);
        pointLight.position.set(0, 0, 5);
        scene.add(pointLight);

        const rimLight = new THREE.SpotLight(0xffffff, 2);
        rimLight.position.set(20, 20, 20);
        scene.add(rimLight);

        // Architectural Core - Crystalline Monoliths
        crystalGroup = new THREE.Group();
        const shardCount = 24; // Harmonic number
        const shardMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x000000,
            metalness: 1,
            roughness: 0.1,
            transmission: 0.9,
            thickness: 5,
            ior: 2.4, // High diamond-like refraction
            attenuationColor: 0xD4AF37,
            attenuationDistance: 1,
            clearcoat: 1
        });

        for(let i = 0; i < shardCount; i++) {
            // Long, elegant shards
            const h = 2 + Math.random() * 4;
            const geo = new THREE.CylinderGeometry(0.05, 0.2, h, 3); 
            const mesh = new THREE.Mesh(geo, shardMaterial);
            
            // Sacred geometry placement
            const angle = (i / shardCount) * Math.PI * 2;
            const radius = 3 + Math.random() * 1.5;
            
            mesh.position.set(
                Math.cos(angle) * radius,
                Math.sin(angle) * radius,
                (Math.random() - 0.5) * 2
            );
            
            mesh.lookAt(0,0,0);
            mesh.rotateX(Math.PI / 2);
            
            mesh.userData.angle = angle;
            mesh.userData.radius = radius;
            mesh.userData.speed = 0.1 + Math.random() * 0.2;
            mesh.userData.originalPos = mesh.position.clone();
            
            crystalGroup.add(mesh);
        }
        scene.add(crystalGroup);

        // Delicate Lattice
        const lineMat = new THREE.LineBasicMaterial({ 
            color: 0xD4AF37, 
            transparent: true, 
            opacity: 0.05 
        });
        const lineGeo = new THREE.BufferGeometry();
        lattice = new THREE.LineSegments(lineGeo, lineMat);
        scene.add(lattice);

        window.addEventListener('resize', onResize);
        document.addEventListener('mousemove', (e) => {
            targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            gsap.to('#cursor', { left: e.clientX, top: e.clientY, duration: 0.3 });
        });

        animate();
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        currentMouse.lerp(targetMouse, 0.05);

        const linePositions = [];

        // Title Breathing
        const breathe = Math.sin(t * 0.5) * 0.05;
        document.getElementById('mainTitle').style.letterSpacing = `${-0.08 + (breathe)}em`;

        crystalGroup.children.forEach((mesh, i) => {
            // Harmonic movement
            const orbit = mesh.userData.angle + (t * mesh.userData.speed);
            const r = mesh.userData.radius + Math.sin(t + i) * 0.2;
            
            // Mouse Repulsion (Elegant)
            const mouseV = new THREE.Vector3(currentMouse.x * 10, currentMouse.y * 10, 0);
            const dist = mesh.position.distanceTo(mouseV);
            const force = Math.max(0, (6 - dist) * 0.1);

            mesh.position.x = Math.cos(orbit) * r + (mesh.position.x - mouseV.x) * force;
            mesh.position.y = Math.sin(orbit) * r + (mesh.position.y - mouseV.y) * force;
            
            mesh.rotation.z += 0.005;

            // Connectivity
            crystalGroup.children.forEach((other, j) => {
                if(i < j) {
                    const d = mesh.position.distanceTo(other.position);
                    if(d < 5) {
                        linePositions.push(mesh.position.x, mesh.position.y, mesh.position.z);
                        linePositions.push(other.position.x, other.position.y, other.position.z);
                    }
                }
            });
        });

        lattice.geometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));

        // Camera Pan (Liquid-smooth)
        camera.position.x += (currentMouse.x * 8 - camera.position.x) * 0.02;
        camera.position.y += (-currentMouse.y * 8 - camera.position.y) * 0.02;
        camera.lookAt(0,0,0);

        renderer.render(scene, camera);
    }

    document.getElementById('btnAction').addEventListener('click', function() {
        const tl = gsap.timeline();
        this.style.pointerEvents = "none";
        
        tl.to(crystalGroup.scale, { x: 0.1, y: 0.1, z: 0.1, duration: 2, ease: "power4.inOut" })
          .to(camera.position, { z: 40, duration: 2, ease: "power4.inOut" }, 0)
          .to(".interface", { opacity: 0, duration: 1 }, 0)
          .set("body", { backgroundColor: "#fff" })
          .set("body", { backgroundColor: "#050505" }, "+=0.05")
          .add(() => {
              crystalGroup.scale.set(1.5, 1.5, 1.5);
              gsap.to(crystalGroup.scale, { x: 1, y: 1, z: 1, duration: 3, ease: "elastic.out(1, 0.3)" });
          })
          .to(camera.position, { z: 25, duration: 2.5, ease: "expo.out" })
          .to(".interface", { opacity: 1, duration: 2 });
    });

    window.onload = init;
</script>

</body>
</html>
